{% extends "base.html" %}
{% block content %}
<div>
    <h6 class="display-1">Dog-List</h6>
    <a href="{% url 'add_dog' %}"><button type="button" class="btn btn-primary">Add dog</button></a>
</div>
<table class="table">
    <thead>
        <tr>
            <th scope="col">name</th>
            <th scope="col">race</th>
            <th scope="col">age</th>
            <th scope="col"></th>
            <th scope="col"></th>
            <th scope="col"></th>
        </tr>
    </thead>
    <tbody>
        {% for dog in dogs %}
        <tr>
            <td scope="row">{{dog.name}}</td>
            <td scope="row">{{dog.race}}</td>
            <td scope="row">{{dog.age}}</td>
            <td scope="row"><a href="{% url 'get_dog_detail' dog.id %}">More</a></td>
            <td scope="row">
                <form method="POST" action="{% url 'delete_dog' dog.id %}" style="display:inline;">
                    {% csrf_token %}
                    <Button type="submit" class="btn btn-danger btn-sm">Delete</Button>
                </form>
            </td>
            <td scope="row">
                <a href="{% url 'alter_dog' dog.id %}" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm">Update</button>
                </a>
            <td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
